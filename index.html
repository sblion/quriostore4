<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔딩</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
background:#ddd;
font-family:'Inter',sans-serif;
}

.container{
position:relative;
width:402px;
height:874px;
background:#F3EFE6;
}


/* 상단 */

.top-bar{
position:absolute;
top:87px;
left:26px;
width:350px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title-box{
position:relative;
width:188px;
height:33px;
filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
}

/* 세 요소가 한 덩어리 */

.rect{
position:absolute;
left:16.5px;
width:60px;
height:33px;
background:white;
}

.circle{
position:absolute;
width:33px;
height:33px;
background:white;
border-radius:50%;
}

.circle.left{left:0;}
.circle.right{right:97px;}

.title{
position:absolute;
left:27px;
top:50%;
transform:translateY(-50%);
font-weight:700;
font-size:20px;
color:#6B4D20;
white-space:nowrap;
}

.progress{
font-weight:700;
font-size:16px;
color:#6B4D20;
}


/* 영상 */

.video-area{
position:absolute;
top:136px;
left:26px;
width:350px;
height:350px;
background:black;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}


/* 재생버튼 */

.play-button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
background:rgba(0,0,0,0.6);
color:white;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
user-select:none;
}


/* 전체화면 버튼 */

.fullscreen-button{
position:absolute;
bottom:10px;
right:10px;
width:36px;
height:36px;
border-radius:6px;
background:rgba(0,0,0,0.6);
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}


/* 로고 */

.logo{
position:absolute;
top:645px;
left:50%;
transform:translateX(-50%);
width:220px;
}

</style>
</head>


<body>

<div class="container">

    <!-- 상단 -->
    <div class="top-bar">

        <div class="title-box">
            <div class="circle left"></div>
            <div class="rect"></div>
            <div class="circle right"></div>
            <div class="title">엔딩</div>
        </div>

        <div class="progress">진행률 100%</div>

    </div>


    <!-- 영상 -->
    <div class="video-area">

        <video id="introVideo">
            <source src="video3.mp4" type="video/mp4">
        </video>

        <div class="play-button" id="playButton">▶</div>

        <div class="fullscreen-button" id="fullscreenButton">⛶</div>

    </div>


    <!-- 로고 -->
    <img src="logo.png" class="logo">

</div>


<script>

const video = document.getElementById("introVideo");
const playButton = document.getElementById("playButton");
const fullscreenButton = document.getElementById("fullscreenButton");


/* 재생버튼 */

playButton.addEventListener("click", function(){

    video.play();
    playButton.style.display = "none";

});


/* 전체화면 */

fullscreenButton.addEventListener("click", function(){

    if(video.requestFullscreen){
        video.requestFullscreen();
    } 
    else if(video.webkitRequestFullscreen){
        video.webkitRequestFullscreen();
    } 
    else if(video.msRequestFullscreen){
        video.msRequestFullscreen();
    }

});

</script>

</body>

</html>
