<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔딩</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
background:#ddd;
font-family:'Inter',sans-serif;
min-height: 100vh;
}

.container{
position:relative;
width:100vw;
min-height:100vh;
background:#F3EFE6;
padding-bottom: 50px;
}


/* 상단 */

.title-pill{
position:absolute;
top:87px;
left:6.5%;
width:170px;
height:33px;
background:#fff;
border-radius:20px;
box-shadow:0 4px 4px rgba(0,0,0,0.25);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:#6B4D20;
font-size:20px;
z-index: 10;
}

.progress{
position:absolute;
top:93px;
right:6.5%;
font-weight:700;
color:#6B4D20;
font-size:16px;
z-index: 10;
}


/* 사진 슬라이드 */

.slider-area{
position:absolute;
top:136px;
left:6.5%;
width:87%;
aspect-ratio:1/1;
background:#eee;
overflow:hidden; /* 영역 밖 사진 숨김 */
border-radius:12px;
}

.slider-wrapper {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.slider-wrapper img {
    width: 100%;
    height: 100%;
    flex-shrink: 0; /* 이미지 크기 고정 */
    object-fit: cover;
}

/* 슬라이드 버튼 (좌/우) */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.3);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    user-select: none;
    z-index: 5;
}

.prev-btn { left: 10px; }
.next-btn { right: 10px; }

.page-indicator {
    position: absolute;
    top: calc(136px + 87vw + 15px); /* 슬라이드 영역 바로 아래 배치 */
    left: 50%;
    transform: translateX(-50%);
    font-weight: 700;
    color: #6B4D20;
    font-size: 18px;
    letter-spacing: 1px;
}

/* 로고 */

.logo{
position:absolute;
top:78%;
left:50%;
transform:translate(-50%,-50%);
width:220px;
max-width:60%;
cursor: pointer; /* 클릭 가능하다는 표시 */
user-select: none; /* 연속 클릭 시 이미지 선택 방지 */
-webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
}

</style>
</head>


<body>

<div class="container">
    <!-- 상단 -->
    <div class="title-pill">엔딩</div>
    <div class="progress">진행률 100%</div>

<div class="slider-area">
        <div class="slider-wrapper" id="sliderWrapper">
            <img src="photo1.png" alt="사진 1">
            <img src="photo2.png" alt="사진 2">
            <img src="photo3.png" alt="사진 3">
            <img src="photo4.png" alt="사진 4">
            <img src="photo5.png" alt="사진 5">
            <img src="photo6.png" alt="사진 6">
        </div>

        <div class="nav-btn prev-btn" id="prevBtn">❮</div>
        <div class="nav-btn next-btn" id="nextBtn">❯</div>
    </div>

    <div class="page-indicator" id="pageIndicator">1 / 6</div>

    <!-- 로고 -->
    <img src="logo.png" class="logo" id="logoBtn">

</div>


<script>

const wrapper = document.getElementById('sliderWrapper');
const images = document.querySelectorAll('.slider-wrapper img');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageIndicator = document.getElementById('pageIndicator');
const logoBtn = document.getElementById('logoBtn');

    let currentIndex = 0;
    const totalImages = images.length;

    function updateSlider() {
        // 이미지 이동 로직
        wrapper.style.transform = `translateX(${-currentIndex * 100}%)`;
        // 하단 페이지 번호만 업데이트
        pageIndicator.innerText = `${currentIndex + 1} / ${totalImages}`;
    }

    nextBtn.addEventListener('click', () => {
        if (currentIndex < totalImages - 1) {
            currentIndex++;
            updateSlider();
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlider();
        }
    });

    let clickCount = 0;

    logoBtn.addEventListener('click', () => {
        clickCount++;
        
        // 콘솔창에서 횟수 확인 가능 (필요 없으면 삭제하세요)
        console.log("터치 횟수: " + clickCount);

        if (clickCount >= 10) {
            window.location.href = 'page2.html';
        }
    });

</script>

</body>
</html>
